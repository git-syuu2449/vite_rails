services:
  web:
    # container_name: rails_app # 自動生成に任せる
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      args:
        U_ID: ${U_ID}
        G_ID: ${G_ID}
        USERNAME: ${USERNAME}
        GROUPNAME: ${GROUPNAME}
    # command: sleep infinity # 待機状態にする（初回）
    user: "${U_ID}:${G_ID}" 
    # user: root # rails new時はrootで実行
    ports:
      - "${APP_PORT}:3000"
      - ${VITE_RUBY_PORT}:3036 # vite dev
      - ${VITE_RUBY_TEST_PORT}:3037 # vite test
    environment:
      RAILS_ENV: ${RAILS_ENV}
      VITE_RUBY_HOST: ${VITE_RUBY_HOST}
      VITE_RUBY_PORT: ${VITE_RUBY_PORT}
    volumes:
      - .:/app
      - ~/.docker_bash_history:/appuser/.bash_history
    depends_on:
      - db

# ---------------------------------------------------------------

  nginx:
    # container_name: rails_nginx
    image: nginx:alpine # 軽量イメージ
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    # command: sleep infinity
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      # - ./wait-for-it.sh:/usr/local/bin/wait-for-it.sh:ro # healthチェックを行う場合
    depends_on:
      - web

# ---------------------------------------------------------------

  db:
    image: postgres:17.5
    # container_name: rails_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./docker/db/data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

# ---------------------------------------------------------------

  pgadmin:
    image: dpage/pgadmin4:9.4 # 9.2以前は脆弱性がある為使わない
    # container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGA_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGA_PASSWORD}
    ports:
      - "${PGA_PORT:-8081}:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin
# 永続化
volumes:
  pgadmin_data:
